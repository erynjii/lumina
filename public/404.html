<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — Lumina by Mirra Professional</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:'Inter',system-ui,-apple-system,sans-serif;
      background:#1a1a1a;
      color:#f5f1ea;
      display:grid;
      place-items:center;
      padding:2rem;
      text-align:center;
      line-height:1.6;
    }
    .wrap{max-width:520px}
    .eyebrow{
      font-size:.75rem;
      letter-spacing:.3em;
      text-transform:uppercase;
      color:#a89e8d;
      margin-bottom:1.25rem;
    }
    h1{
      font-family:'Playfair Display',Georgia,serif;
      font-weight:300;
      font-size:clamp(2.5rem,8vw,4rem);
      letter-spacing:.02em;
      margin-bottom:1rem;
    }
    p{
      color:#d6cfc2;
      font-weight:300;
      margin-bottom:2rem;
    }
    a.button{
      display:inline-block;
      padding:.85rem 2rem;
      border:1px solid #a89e8d;
      color:#f5f1ea;
      text-decoration:none;
      letter-spacing:.15em;
      text-transform:uppercase;
      font-size:.75rem;
      transition:background .2s,color .2s;
    }
    a.button:hover{
      background:#f5f1ea;
      color:#1a1a1a;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">404 — Page Not Found</p>
    <h1>Lost in the shine.</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="button">Return Home</a>
  </div>
</body>
</html>
